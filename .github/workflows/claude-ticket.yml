name: Claude Ticket

on:
  repository_dispatch:
    types: [claude-ticket]

jobs:
  work:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ticket/${{ github.event.client_payload.ticket_id }}

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--dangerously-skip-permissions'
          prompt: |
            Mode: ${{ github.event.client_payload.is_followup && 'FOLLOW-UP' || 'NEW' }}
            Branch: ticket/${{ github.event.client_payload.ticket_id }}
            Prior PR: ${{ github.event.client_payload.prior_pr_url }}
            Email thread: ${{ github.event.client_payload.thread_url }}

            Subject: ${{ github.event.client_payload.title }}
            From: ${{ github.event.client_payload.from }}

            Messages:
            ${{ github.event.client_payload.description }}

            The ticket branch is already checked out for you.

            Binary attachments (images, etc.) referenced in the messages above have been
            staged at `.tickets/${{ github.event.client_payload.ticket_id }}/`. Move them
            to their final destinations in the repo, then DELETE the `.tickets/` folder
            in the same commit so it doesn't end up in the PR.

            If Mode is FOLLOW-UP: this branch already contains your prior changes from
            an earlier round. Build on top — do NOT start from scratch. The messages
            above are NEW since the last round; treat them as the delta to address.
            Push commits to the same branch; the PR auto-updates.

            If Mode is NEW: open a PR from this branch to the default branch.

            Engineering principles (apply throughout):
            1. Don't assume. Don't hide confusion. Surface tradeoffs.
            2. Minimum code that solves the problem. Nothing speculative.
            3. Touch only what you must. Clean up only your own mess.
            4. Define success criteria. Loop until verified.

            Output requirements:
            - Branch name MUST be exactly: ticket/${{ github.event.client_payload.ticket_id }}
            - PR title: short summary of the change.
            - PR body: link the email thread (${{ github.event.client_payload.thread_url }}).
            - On NEW: open the PR. On FOLLOW-UP: do not open a second PR; push to the existing one.

            Content sanitization:
            - When transcribing copy from attachments (Word/PDF) into source code,
              normalize curly quotes to straight ASCII: ' ' → ' ; " " → " ; – — → -
              Smart quotes break JS/TS/Astro parsing.
            - Strip non-breaking spaces (U+00A0) and replace with regular spaces.

      - name: Inject Netlify preview URL into PR body
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ vars.NETLIFY_SITE_SLUG }}
          BRANCH: ticket/${{ github.event.client_payload.ticket_id }}
        run: |
          PR_JSON=$(gh pr list --head "$BRANCH" --json number,body --limit 1)
          NUM=$(echo "$PR_JSON" | jq -r '.[0].number // empty')
          if [ -n "$NUM" ]; then
            BODY=$(echo "$PR_JSON" | jq -r '.[0].body // ""')
            PREVIEW="https://deploy-preview-${NUM}--${SLUG}.netlify.app"
            # Only append the preview line if it isn't already present.
            if ! echo "$BODY" | grep -q "deploy-preview-${NUM}--"; then
              printf "%s\n\n---\nPreview: %s\n" "$BODY" "$PREVIEW" > /tmp/body.md
              gh pr edit "$NUM" --body-file /tmp/body.md
            fi
          fi
